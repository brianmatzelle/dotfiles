# Hyprland Configuration
# Migrated from i3wm - Enhanced for Wayland

# ============================================
# MONITORS
# ============================================
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1

# ============================================
# AUTOSTART
# ============================================
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet
exec-once = dunst
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprland-autotile

# ============================================
# ENVIRONMENT VARIABLES
# ============================================
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ============================================
# VARIABLES
# ============================================
$mod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun -m -1

# ============================================
# INPUT CONFIGURATION
# ============================================
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 0
    mouse_refocus = false

    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# ============================================
# GENERAL APPEARANCE
# ============================================
general {
    gaps_in = 8
    gaps_out = 4
    border_size = 2

    # Dracula-inspired colors (matching i3 theme)
    col.active_border = rgba(00FF41CC) rgba(00FF41CC) 45deg
    col.inactive_border = rgba(44475ACC)

    layout = dwindle

    allow_tearing = false
}

# ============================================
# DECORATIONS
# ============================================
decoration {
    rounding = 0

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ============================================
# ANIMATIONS
# ============================================
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ============================================
# LAYOUTS
# ============================================
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

master {
    new_status = master
}

# ============================================
# GESTURES
# ============================================
# gestures {
#     # No gesture options configured
# }

# ============================================
# MISC SETTINGS
# ============================================
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ============================================
# KEY BINDINGS
# ============================================

# Main bindings
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, D, exec, $menu
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen, 0
# bind = $mod, A, focusparent,  # Not available in Hyprland
bind = $mod, P, pseudo, # dwindle
bind = $mod, S, togglesplit, # dwindle

# Layout toggles
bind = $mod, W, exec, hyprctl keyword general:layout master
bind = $mod, E, exec, hyprctl keyword general:layout dwindle

# Scratchpad
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace,

# Move focus with vim keys
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, L, movefocus, u
bind = $mod, semicolon, movefocus, r

# Move focus with arrow keys
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Move windows with vim keys
bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, L, movewindow, u
bind = $mod SHIFT, semicolon, movewindow, r

# Move windows with arrow keys
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Switch workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move workspace to different monitor
bind = $mod CTRL SHIFT, left, movecurrentworkspacetomonitor, l
bind = $mod CTRL SHIFT, right, movecurrentworkspacetomonitor, r

# Scroll through existing workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize mode (submap)
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , semicolon, resizeactive, 10 0
binde = , J, resizeactive, -10 0
binde = , L, resizeactive, 0 -10
binde = , K, resizeactive, 0 10
bind = , escape, submap, reset
bind = , Return, submap, reset
bind = $mod, R, submap, reset
submap = reset

# Gap controls
bind = $mod CTRL, plus, exec, hyprctl keyword general:gaps_in $(($(hyprctl getoption general:gaps_in | grep int | awk '{print $2}') + 5))
bind = $mod CTRL, minus, exec, hyprctl keyword general:gaps_in $(($(hyprctl getoption general:gaps_in | grep int | awk '{print $2}') - 5))
bind = $mod CTRL SHIFT, plus, exec, hyprctl keyword general:gaps_out $(($(hyprctl getoption general:gaps_out | grep int | awk '{print $2}') + 5))
bind = $mod CTRL SHIFT, minus, exec, hyprctl keyword general:gaps_out $(($(hyprctl getoption general:gaps_out | grep int | awk '{print $2}') - 5))
bind = $mod CTRL, G, exec, hyprctl keyword general:gaps_in 8 && hyprctl keyword general:gaps_out 4
bind = $mod CTRL SHIFT, G, exec, hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0

# ============================================
# MULTIMEDIA KEYS
# ============================================

# Volume controls (5% increments)
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness controls
binde = , XF86MonBrightnessUp, exec, brightnessctl set +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Screenshot tools (grim + slurp)
bind = , Print, exec, grim ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Lock screen
bind = $mod CTRL, L, exec, hyprlock

# ============================================
# ADDITIONAL SHORTCUTS
# ============================================

# Web browser
bind = $mod SHIFT, W, exec, firefox

# System monitor
bind = $mod SHIFT, T, exec, ghostty -e btop

# Reload configuration
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload

