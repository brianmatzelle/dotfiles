# Hyprlock configuration - Matrix theme
# Black background to match i3lock style

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/dotfiles/wallpapers/cowboy.jpg
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(00FF41FF)
    font_size = 120
    font_family = DejaVu Sans Mono
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(F8F8F2FF)
    font_size = 25
    font_family = DejaVu Sans Mono
    position = 0, 80
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(00FF41CC)
    inner_color = rgba(282A36FF)
    font_color = rgba(F8F8F2FF)
    fade_on_empty = false
    placeholder_text = <span foreground="##F8F8F2">Enter Password...</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}
